<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #eee; border-radius: 10px; }
        .header { background: #f97316; color: white; padding: 20px; text-align: center; border-radius: 10px 10px 0 0; }
        .content { padding: 20px; }
        .field { margin-bottom: 15px; }
        .label { font-weight: bold; color: #f97316; }
        .footer { text-align: center; font-size: 12px; color: #777; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>New Inquiry from SUVTEX Website</h1>
        </div>
        <div class="content">
            <p>You have received a new message from the contact form.</p>
            
            <div class="field">
                <span class="label">From Name:</span> {{from_name}}
            </div>
            
            <div class="field">
                <span class="label">Email:</span> {{from_email}}
            </div>
            
            <div class="field">
                <span class="label">Phone/Whatsapp:</span> {{phone}}
            </div>
            
            <div class="field">
                <span class="label">Message:</span>
                <p>{{message}}</p>
            </div>
        </div>
        <div class="footer">
            &copy; 2024 SUVTEX India. All rights reserved.
        </div>
    </div>
</body>
</html>
